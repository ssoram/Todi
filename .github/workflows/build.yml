name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install
        working-directory: sticker-tauri

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: sticker-tauri/src-tauri

      - name: Get release notes
        id: notes
        shell: bash
        run: |
          # annotated tag 메시지에서 첫 줄(제목) 제외한 본문 추출
          git fetch --tags --force
          TAG_MSG=$(git tag -l --format='%(contents:body)' ${{ github.ref_name }})
          # Co-Authored-By 줄 제거
          TAG_MSG=$(echo "$TAG_MSG" | grep -v '^Co-Authored-By:')
          echo "body<<EOFNOTES" >> $GITHUB_OUTPUT
          echo "## 변경사항" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$TAG_MSG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "## 다운로드" >> $GITHUB_OUTPUT
          echo "- **Windows**: \`.exe\` 파일 다운로드 후 실행" >> $GITHUB_OUTPUT
          echo "- **macOS**: \`.dmg\` 또는 \`.zip\` 파일 다운로드" >> $GITHUB_OUTPUT
          echo "  - \`.zip\` 권장: 압축 해제 → 앱 우클릭 → 열기" >> $GITHUB_OUTPUT
          echo "  - \`.dmg\` 사용 시 \"손상된 디스크 이미지\" 오류가 나면: 터미널에서 \`xattr -cr ~/Downloads/Todi*.dmg\` 실행 후 다시 열기" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "기존 사용자는 앱 실행 시 자동 업데이트됩니다." >> $GITHUB_OUTPUT
          echo "EOFNOTES" >> $GITHUB_OUTPUT

      - name: Build & Release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: sticker-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Todi ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true

      - name: Upload macOS zip
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_PATH=$(find sticker-tauri/src-tauri/target -name "Todi.app" -path "*/bundle/macos/*" | head -1)
          echo "Found app at: $APP_PATH"
          ZIP_NAME="Todi_${{ github.ref_name }}_macos.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          gh release upload ${{ github.ref_name }} "$ZIP_NAME" --clobber
