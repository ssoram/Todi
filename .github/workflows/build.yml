name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install
        working-directory: sticker-tauri

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: sticker-tauri/src-tauri

      - name: Get release notes
        id: notes
        if: matrix.os == 'ubuntu-latest' || true
        run: |
          BODY=$(git log -1 --format="%b" ${{ github.ref_name }})
          echo "body<<EOFNOTES" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "## 다운로드" >> $GITHUB_OUTPUT
          echo "- **Windows**: \`.exe\` 파일 다운로드 후 실행" >> $GITHUB_OUTPUT
          echo "- **macOS**: \`.dmg\` 파일 다운로드 후 실행" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "기존 사용자는 앱 실행 시 자동 업데이트됩니다." >> $GITHUB_OUTPUT
          echo "EOFNOTES" >> $GITHUB_OUTPUT

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: sticker-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Todi ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true
