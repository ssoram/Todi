<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="styles.css">
<style>
body{background:var(--cal-bg,#FFF5F0)}
.strip{background:var(--cal-accent,#FF8A65)}
.hdr{background:var(--cal-hdr,#FFAB91)}
.hdr .tt,.hdr .cnt,.ct button{color:var(--cal-text,#BF360C)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--cal-hdr,#FFAB91);border-bottom:1px solid rgba(0,0,0,.06)}
.nav button{background:none;border:none;cursor:pointer;padding:4px 10px;border-radius:4px;font-size:calc(var(--fs) + 2px);font-family:inherit;color:var(--cal-text,#BF360C);font-weight:bold}
.nav button:hover{background:rgba(0,0,0,.06)}
.nav .month{font-weight:bold;font-size:calc(var(--fs) + 1px);color:var(--cal-text,#BF360C)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:4px 6px;flex:1;overflow-y:auto}
.cal-grid::-webkit-scrollbar{width:5px}
.cal-grid::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}
.day-hdr{text-align:center;font-size:calc(var(--fs) - 2px);font-weight:bold;padding:4px;color:#888}
.day-hdr.sun{color:#E53935}
.day-hdr.sat{color:#1565C0}
.day{min-height:60px;padding:3px;border-radius:4px;cursor:pointer;transition:background .15s;border:1px solid transparent;position:relative}
.day:hover{background:rgba(0,0,0,.04)}
.day.today{border-color:var(--cal-accent,#FF8A65);background:rgba(255,138,101,.08)}
.day.other{opacity:.35}
.day .dn{font-size:calc(var(--fs) - 2px);font-weight:bold;margin-bottom:2px;color:#555}
.day.sun .dn{color:#E53935}
.day.sat .dn{color:#1565C0}
.day .items{font-size:calc(var(--fs) - 4px)}
.day .di{padding:1px 3px;border-radius:2px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:rgba(0,0,0,.04);font-weight:500}
.day .di.done-item{text-decoration:line-through;opacity:.5}
.day .di.sched{border-left:2px solid currentColor}
/* 팝업 공통 */
.pop-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:100;justify-content:center;align-items:center}
.pop-overlay.show{display:flex}
.pop-box{background:#fff;border-radius:8px;padding:16px;width:90%;max-width:380px;box-shadow:0 8px 30px rgba(0,0,0,.15);max-height:80vh;display:flex;flex-direction:column}
.pop-box h3{margin-bottom:10px;font-size:var(--fs);display:flex;align-items:center;gap:6px}
.pop-box input,.pop-box textarea,.pop-box select{width:100%;padding:7px 10px;border:1px solid #D4D3CC;border-radius:5px;font-size:var(--fs);font-family:inherit;outline:none;margin-bottom:6px;resize:vertical}
.pop-box textarea{min-height:40px}
.pop-box input:focus,.pop-box textarea:focus{border-color:var(--cal-accent,#FF8A65)}
.pop-box .ab{display:flex;gap:6px;justify-content:flex-end;margin-top:6px;align-items:center}
.pop-box .ab button{padding:5px 14px;border-radius:5px;border:none;cursor:pointer;font-family:inherit}
/* 날짜 상세 팝업 */
.day-list{flex:1;overflow-y:auto;margin-bottom:8px}
.day-list::-webkit-scrollbar{width:4px}
.day-list::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px}
.dl-item{padding:8px 10px;border-radius:6px;margin-bottom:6px;border:1px solid #eee;position:relative}
.dl-item .dl-title{font-weight:600;font-size:var(--fs);word-break:break-word}
.dl-item .dl-desc{font-size:calc(var(--fs) - 2px);color:#777;margin-top:3px;white-space:pre-wrap;word-break:break-word}
.dl-item .dl-cat{font-size:calc(var(--fs) - 3px);margin-top:4px;display:inline-block;padding:1px 6px;border-radius:3px;background:rgba(0,0,0,.05)}
.dl-item .dl-status{font-size:calc(var(--fs) - 3px);color:#999;margin-left:4px}
.dl-item .dl-btns{display:flex;gap:4px;margin-top:6px}
.dl-item .dl-btns button{padding:3px 8px;border-radius:4px;border:none;cursor:pointer;font-size:calc(var(--fs) - 2px);font-family:inherit;transition:filter .15s}
.dl-item .dl-btns button:hover{filter:brightness(.9)}
.dl-item.done-item{opacity:.6}
.dl-item.done-item .dl-title{text-decoration:line-through}
.dl-empty{text-align:center;color:#bbb;padding:16px}
</style>
</head><body>
<div class="strip"></div>
<div class="hdr">
 <div class="lf"><span id="hI"></span><span class="tt">달력</span><span class="cnt" id="cnt"></span></div>
 <div class="ct">
  <button id="pinB" onclick="togglePin()"></button>
  <button onclick="invoke('minimize_window',{label:'calendar'})"><span id="_min"></span></button>
  <button class="xb" onclick="invoke('close_window',{label:'calendar'})"><span id="_x"></span></button>
 </div>
</div>
<div class="nav">
 <button onclick="changeMonth(-1)">&lt;</button>
 <span class="month" id="mLabel"></span>
 <button onclick="changeMonth(1)">&gt;</button>
</div>
<div class="cal-grid" id="grid"></div>

<!-- 날짜 상세 팝업 -->
<div class="pop-overlay" id="dayPop"><div class="pop-box">
 <h3 id="dayTitle">날짜</h3>
 <div class="day-list" id="dayList"></div>
 <div class="ab">
  <button id="dayAddBtn" onclick="openForm(selDate)" style="background:#5CB85C;color:#fff">+ 추가</button>
  <button onclick="closeDayPop()" style="background:#eee;color:#333">닫기</button>
 </div>
</div></div>

<!-- 추가/수정 폼 팝업 -->
<div class="pop-overlay" id="formPop"><div class="pop-box">
 <h3 id="formTitle">메모 추가</h3>
 <input type="text" id="fInp" placeholder="메모 제목...">
 <textarea id="fDesc" placeholder="상세 내용..."></textarea>
 <div style="display:flex;align-items:center;gap:4px;margin-bottom:6px">
  <button class="mic-btn" id="fMic" onclick="startVoice(this,document.getElementById('fInp'))"></button>
  <span style="font-size:calc(var(--fs) - 3px);color:#aaa">제목/상세 클릭 후 음성 입력</span>
 </div>
 <select id="fCat"></select>
 <label style="display:flex;align-items:center;gap:6px;margin:6px 0;font-size:calc(var(--fs) - 1px);cursor:pointer;user-select:none">
  <input type="checkbox" id="fSchedOnly" style="width:16px;height:16px;accent-color:var(--cal-accent,#FF8A65);cursor:pointer">
  일정만 (Todo 리스트에 표시 안 함)
 </label>
 <div class="ab">
  <button id="fSubmitBtn" onclick="submitForm()" style="background:#5CB85C;color:#fff">추가</button>
  <button onclick="closeForm()" style="background:#eee;color:#333">취소</button>
 </div>
</div></div>

<script src="common.js"></script>
<script>
document.getElementById('hI').innerHTML=S.cal;
document.getElementById('pinB').innerHTML=S.unpin;
document.getElementById('_min').innerHTML=S.min;
document.getElementById('_x').innerHTML=S.x;
document.getElementById('fMic').innerHTML=S.mic;

const CAL_COLORS=[
  {bg:'#FFF5F0',hdr:'#FFAB91',accent:'#FF8A65',text:'#BF360C',name:'coral'},
  {bg:'#FFF9E3',hdr:'#FFE9A0',accent:'#FFD54F',text:'#6B5C00',name:'yellow'},
  {bg:'#EAF3FC',hdr:'#A8D4F5',accent:'#64B5F6',text:'#1A3A5C',name:'blue'},
  {bg:'#ECFAE8',hdr:'#7BC67E',accent:'#66BB6A',text:'#1B5E20',name:'green'},
  {bg:'#F3E5F5',hdr:'#CE93D8',accent:'#AB47BC',text:'#4A148C',name:'purple'},
  {bg:'#FFF3E0',hdr:'#FFB74D',accent:'#FF9800',text:'#E65100',name:'orange'},
  {bg:'#F0F0EA',hdr:'#BDBDBD',accent:'#9E9E9E',text:'#424242',name:'gray'},
  {bg:'#E0F7FA',hdr:'#80DEEA',accent:'#26C6DA',text:'#006064',name:'cyan'},
];

let curYear,curMonth,allData=null,selDate=null;

function applyCalColor(c){
  const r=document.documentElement;
  r.style.setProperty('--cal-bg',c.bg);
  r.style.setProperty('--cal-hdr',c.hdr);
  r.style.setProperty('--cal-accent',c.accent);
  r.style.setProperty('--cal-text',c.text);
}

function loadSavedColor(colorStr){
  if(!colorStr)return;
  if(colorStr.startsWith('custom:')){
    const hex=colorStr.slice(7);
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    const bg=`rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
    const hdr=`rgb(${Math.min(255,r+30)},${Math.min(255,g+30)},${Math.min(255,b+30)})`;
    const lum=r*0.299+g*0.587+b*0.114;
    const text=lum>128?'#333':'#fff';
    applyCalColor({bg,hdr,accent:hex,text});
  } else {
    const c=CAL_COLORS.find(x=>x.name===colorStr);
    if(c)applyCalColor(c);
  }
}

// 달력
const now=new Date();
curYear=now.getFullYear();curMonth=now.getMonth();

function changeMonth(d){curMonth+=d;if(curMonth<0){curMonth=11;curYear--}if(curMonth>11){curMonth=0;curYear++}renderCal()}

function renderCal(){
  document.getElementById('mLabel').textContent=`${curYear}년 ${curMonth+1}월`;
  const grid=document.getElementById('grid');
  const first=new Date(curYear,curMonth,1);
  const last=new Date(curYear,curMonth+1,0);
  const startDay=first.getDay();
  const today=new Date();
  const tStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // 날짜별 메모 맵
  const dateMap={};
  if(allData){
    allData.memos.forEach((m,i)=>{
      if(m.due_date&&m.status!=='trash'){
        if(!dateMap[m.due_date])dateMap[m.due_date]=[];
        dateMap[m.due_date].push({...m,_i:i});
      }
    });
  }

  let h='';
  const days=['일','월','화','수','목','금','토'];
  days.forEach((d,i)=>h+=`<div class="day-hdr${i===0?' sun':''}${i===6?' sat':''}">${d}</div>`);

  // 이전 달
  const prevLast=new Date(curYear,curMonth,0);
  for(let i=startDay-1;i>=0;i--){
    const d=prevLast.getDate()-i;
    const ds=fmtDate(curYear,curMonth-1,d);
    h+=dayCell(d,ds,dateMap[ds]||[],'other',false,false);
  }
  // 이번 달
  for(let d=1;d<=last.getDate();d++){
    const ds=fmtDate(curYear,curMonth,d);
    const isToday=ds===tStr;
    const dow=new Date(curYear,curMonth,d).getDay();
    h+=dayCell(d,ds,dateMap[ds]||[],'',dow===0,dow===6,isToday);
  }
  // 다음 달
  const remaining=42-(startDay+last.getDate());
  for(let d=1;d<=remaining;d++){
    const ds=fmtDate(curYear,curMonth+1,d);
    h+=dayCell(d,ds,dateMap[ds]||[],'other',false,false);
  }
  grid.innerHTML=h;

  // 카운트
  const monthMemos=Object.keys(dateMap).filter(k=>k.startsWith(`${curYear}-${String(curMonth+1).padStart(2,'0')}`));
  let cnt=0;monthMemos.forEach(k=>cnt+=dateMap[k].length);
  document.getElementById('cnt').textContent=cnt?cnt+'개':'';
}

function fmtDate(y,m,d){
  const dt=new Date(y,m,d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

// 카테고리→색상 매핑
function catColor(cat){
  if(!allData)return'#555';
  const idx=allData.categories.indexOf(cat);
  if(idx<0)return'#555';
  // CC와 동일한 팔레트에서 진한 텍스트 색 생성
  const hues=['#E65100','#2E7D32','#6A1B9A','#00838F','#BF360C','#558B2F','#4527A0','#00695C'];
  return hues[idx%hues.length];
}

function dayCell(d,ds,items,cls,isSun,isSat,isToday){
  let extra='';
  if(isSun)extra+=' sun';if(isSat)extra+=' sat';if(isToday)extra+=' today';
  let ih='';
  items.slice(0,3).forEach(m=>{
    const clr=catColor(m.category);
    const sc=m.status==='schedule'?' sched':'';
    ih+=`<div class="di${m.done?' done-item':''}${sc}" style="color:${clr}">${esc(m.text)}</div>`;
  });
  if(items.length>3)ih+=`<div class="di" style="color:#999">+${items.length-3}</div>`;
  return `<div class="day ${cls}${extra}" onclick="openDay('${ds}')" title="${ds}">
    <div class="dn">${d}</div><div class="items">${ih}</div></div>`;
}

// ── 날짜 상세 팝업 ──
function openDay(date){
  selDate=date;
  document.getElementById('dayTitle').textContent=date;
  renderDayList(date);
  document.getElementById('dayPop').classList.add('show');
}
function closeDayPop(){document.getElementById('dayPop').classList.remove('show');selDate=null}

function renderDayList(date){
  const el=document.getElementById('dayList');
  if(!allData){el.innerHTML='<div class="dl-empty">데이터 없음</div>';return}
  const items=allData.memos.map((m,i)=>({...m,_i:i})).filter(m=>m.due_date===date&&m.status!=='trash');
  if(!items.length){el.innerHTML='<div class="dl-empty">이 날짜에 일정이 없습니다</div>';return}
  let h='';
  items.forEach(m=>{
    const clr=catColor(m.category);
    const desc=m.description?`<div class="dl-desc">${esc(m.description)}</div>`:'';
    const stLabel=m.status==='schedule'?'일정':m.status==='done'?'완료':m.status==='doing'?'진행중':'할일';
    h+=`<div class="dl-item${m.done?' done-item':''}" style="border-left:3px solid ${clr}">
      <div class="dl-title">${esc(m.text)}</div>${desc}
      <div><span class="dl-cat" style="color:${clr}">${esc(m.category)}</span><span class="dl-status">${stLabel}</span></div>
      <div class="dl-btns">
        <button style="background:#D6EAFF;color:#1565C0" onclick="openEdit(${m._i})">${S.edit} 수정</button>
        ${m.done?'':`<button style="background:#E8F5E9;color:#2E7D32" onclick="invoke('complete_memo',{idx:${m._i}})">${S.done} 완료</button>`}
        <button style="background:#FFE0E0;color:#C62828" onclick="delItem(${m._i})">${S.trash}</button>
      </div>
    </div>`;
  });
  el.innerHTML=h;
}

async function delItem(idx){if(await customConfirm('이 메모를 삭제할까요?'))invoke('delete_memo',{idx})}

// ── 추가/수정 폼 ──
let editIdx=null;

function loadCatSelect(){
  if(!allData)return;
  const sel=document.getElementById('fCat');sel.innerHTML='';
  allData.categories.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o)});
}

function openForm(date){
  editIdx=null;
  document.getElementById('formTitle').textContent=date+' 메모 추가';
  document.getElementById('fInp').value='';
  document.getElementById('fDesc').value='';
  document.getElementById('fSchedOnly').checked=false;
  document.getElementById('fSubmitBtn').textContent='추가';
  loadCatSelect();
  document.getElementById('formPop').classList.add('show');
  document.getElementById('fInp').focus();
}

function openEdit(idx){
  const m=allData.memos[idx];if(!m)return;
  editIdx=idx;
  document.getElementById('formTitle').textContent='메모 수정';
  document.getElementById('fInp').value=m.text;
  document.getElementById('fDesc').value=m.description||'';
  document.getElementById('fSchedOnly').checked=m.status==='schedule';
  document.getElementById('fSubmitBtn').textContent='저장';
  loadCatSelect();
  document.getElementById('fCat').value=m.category;
  document.getElementById('formPop').classList.add('show');
  document.getElementById('fInp').focus();
}

function closeForm(){document.getElementById('formPop').classList.remove('show');editIdx=null}

async function submitForm(){
  const t=document.getElementById('fInp').value.trim();
  if(!t)return;
  const desc=document.getElementById('fDesc').value.trim();
  const cat=document.getElementById('fCat').value;
  const sched=document.getElementById('fSchedOnly').checked;
  if(editIdx!==null){
    // 수정
    const st=sched?'schedule':allData.memos[editIdx].status;
    await invoke('edit_memo',{idx:editIdx,text:t,desc,category:cat,dueDate:selDate});
    if(sched&&allData.memos[editIdx].status!=='schedule')await invoke('move_memo',{idx:editIdx,target:'schedule'});
    else if(!sched&&allData.memos[editIdx].status==='schedule')await invoke('move_memo',{idx:editIdx,target:'todo'});
  } else {
    // 추가
    const st=sched?'schedule':'todo';
    await invoke('add_memo',{text:t,desc,category:cat,status:st,dueDate:selDate});
  }
  closeForm();
}
document.getElementById('fInp').addEventListener('keydown',e=>{if(e.key==='Enter')submitForm()});

function render(D){allData=D;renderCal();if(selDate&&document.getElementById('dayPop').classList.contains('show'))renderDayList(selDate)}
function togglePin(){togglePosLock()}

async function init(){
  await applyFont();
  const s=await invoke('get_settings');
  loadSavedColor(s.calendar_color);
  try{render(await invoke('get_all_data'))}catch(e){}
}

listen('data-changed',e=>render(e.payload));
listen('settings-changed',e=>loadSavedColor(e.payload.calendar_color));
init();
</script></body></html>
